
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Metals | CommoditySuperCycle</title>

<meta property="og:image" content="https://1charts.github.io/CSC/charts/45.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://1charts.github.io/CSC/charts/45.png">

<link rel="icon" type="image/png" href="https://commoditysupercycle.com/assets/logo192-C5BlHOLs.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
* { box-sizing: border-box; }
body { 
    margin:0; background:#0f172a; font-family: 'Segoe UI', Arial, sans-serif; color:#e2e8f0; 
    overflow: hidden; /* Evita lo scroll indesiderato */
    height: 100vh; width: 100vw;
}

/* Messaggio Rotazione */
#rotate-message {
    display: none; position: fixed; top:0; left:0; width:100%; height:100%;
    background:#0f172a; z-index: 999; flex-direction: column;
    justify-content: center; align-items: center; text-align: center; padding: 20px;
}

@media (orientation: portrait) {
    #rotate-message { display: flex; }
}

.container { 
    width: 100%; height: 100vh; display: flex; flex-direction: column;
    padding: 10px 15px;
}

.header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-shrink: 0; }
.title { font-size: 20px; font-weight: bold; color:#f8fafc; margin: 0; }
.subtitle { font-size: 13px; color:#67e8f9; text-decoration: none; }

.actions { display: flex; gap: 8px; }
.action-btn { 
    background: #1e293b; border: none; color: #f8fafc; padding: 6px; 
    border-radius: 6px; cursor: pointer; display: flex; align-items: center;
}

/* Grafico Adattivo */
#full-capture-area { 
    flex-grow: 1; display: flex; flex-direction: column; 
    justify-content: center; position: relative; overflow: hidden;
}

.chart-container { width: 100%; height: auto; max-height: 80vh; display: flex; justify-content: center; }
img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }

/* Navigazione */
.nav-bottom {
    position: absolute; bottom: 20%; right: 10px;
    display: flex; gap: 10px; z-index: 20;
}
.nav-link {
    background: rgba(30, 41, 59, 0.9); color: #67e8f9; padding: 8px;
    border-radius: 50%; border: 1px solid #334155;
}
.nav-link svg { width: 30px; height: 30px; stroke-width: 3; }

.source { font-size:11px; color:#94a3b8; margin-top: 5px; flex-shrink: 0; }

/* Stile per lo screenshot (nascosto) */
#screenshot-title-box { display: none; }
</style>
</head>

<body>

<div id="rotate-message">
    <svg width="50" height="50" viewBox="0 0 24 24" fill="#67e8f9"><path d="M16.48 2.52c3.27 1.55 5.61 4.72 5.97 8.48h2C24 4.96 19.1 0 13 0l-1.65 1.65 1.41 1.41 3.72-3.54zM7.52 21.48C4.25 19.93 1.91 16.76 1.55 13h-2C-.45 19.04 4.45 24 10.55 24l1.65-1.65-1.41-1.41-3.27 3.54zM21 5H3c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 12H3V7h18v10z"/></svg>
    <h2 style="margin-top:20px">Please rotate your device</h2>
    <p>This chart is best viewed in landscape mode.</p>
</div>

<div class="container">
  <div class="header-row">
    <div class="title-group">
      <div class="title">Metals</div>
      <a class="subtitle" href="https://commoditysupercycle.com/" target="_blank">commoditysupercycle.com</a>
    </div>
    <div class="actions">
      <button class="action-btn" onclick="toggleFullScreen()" title="Full Screen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
      <button class="action-btn" onclick="takeScreenshot()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      </button>
      <a class="action-btn" href="https://twitter.com/intent/tweet?url=https://1charts.github.io/CSC/45.html&text=Metals%20-%20via%20%40CommodityCSC" target="_blank">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.045 4.126H5.078z"/></svg>
      </a>
    </div>
  </div>

  <div id="full-capture-area">
    <div id="screenshot-title-box" style="margin-bottom:10px;">
        <div style="font-size:24px; font-weight:bold; color:#f8fafc;">Metals</div>
        <div style="font-size:14px; color:#67e8f9;">commoditysupercycle.com</div>
    </div>
    <div class="chart-container">
      <img src="charts/45.png">
    </div>
    <div class="nav-bottom" id="nav-arrows">
        <a class="nav-link" href="44.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg></a>
        <a class="nav-link" href="46.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 18l6-6-6-6"/></svg></a>
    </div>
    <div class="source">Source: <a href="#" target="_blank">Dati Finanziari</a></div>
  </div>
</div>

<script>
function toggleFullScreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
            alert(`Error: ${err.message}`);
        });
    } else {
        document.exitFullscreen();
    }
}

function takeScreenshot() {
    const area = document.getElementById('full-capture-area');
    const screenshotBox = document.getElementById('screenshot-title-box');
    const nav = document.getElementById('nav-arrows');
    
    screenshotBox.style.display = 'block';
    nav.style.visibility = 'hidden';

    html2canvas(area, { backgroundColor: "#0f172a", scale: 2, useCORS: true }).then(canvas => {
        const link = document.createElement('a');
        link.download = '45_CSC.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
        screenshotBox.style.display = 'none';
        nav.style.visibility = 'visible';
    });
}
</script>
</body>
</html>
