<!DOCTYPE html>
<html>
<head>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script>
    google.charts.load('current', {packages: ['corechart']});
    google.charts.setOnLoadCallback(drawChart);

    function drawChart() {
      const PROXY = 'TUO_URL_EXEC_QUI'; 
      const KEY = 'v3K8pQ2n'; 
      const q = encodeURIComponent('select A, B, Q, S');
      const url = `${PROXY}?key=${KEY}&gid=0&q=${q}`;

      new google.visualization.Query(url).send(res => {
        if (res.isError()) return;
        const data = res.getDataTable();
        const style = { color: '#cbd5e1' };
        
        const options = {
          title: 'Upstream companies NYSE',
          titleTextStyle: { color: '#f8fafc', fontSize: 20, bold: true },
          width: '100%', height: 620,
          backgroundColor: '#0f172a',
          chartArea: { width: '85%', height: '75%' },
          legend: { position: 'bottom', textStyle: { color: '#e2e8f0' } },
          curveType: 'function',
          tooltip: { trigger: 'none' },
          vAxes: {
            0: { title: 'Scala SINISTRA', titleTextStyle: style, textStyle: style, gridlines: { color: '#334155' } },
            1: { title: 'Scala DESTRA', titleTextStyle: style, textStyle: style, gridlines: { color: '#334155' } }
          },
          series: {
            0: { targetAxisIndex: 0, color: '#22d3ee', lineWidth: 4 },
            1: { targetAxisIndex: 1, color: '#c084fc', lineWidth: 2 },
            2: { targetAxisIndex: 1, color: '#4ade80', lineWidth: 2 }
          },
          hAxis: { textStyle: style, gridlines: { color: '#334155' } }
        };

        new google.visualization.ComboChart(document.getElementById('c')).draw(data, options);
      });
    }
  </script>
</head>
<body style="margin:0; background:#0f172a; font-family: sans-serif;">
  <div id="c" style="width:100%; height:620px;"></div>
  <div style="text-align:center; font-size:13px; color:#94a3b8; margin-top:10px;">
    Source: <a href="https://commoditysupercycle.com/" target="_blank" style="color:#67e8f9; text-decoration:none; font-weight:bold;">commoditysupercycle.com</a>
  </div>
</body>
</html>
