<!DOCTYPE html>
<html>
<head>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script>
    google.charts.load('current', {packages: ['corechart']});
    google.charts.setOnLoadCallback(drawChart);

    function drawChart() {
      // === CONFIGURAZIONE PROXY + CHIAVE SEGRETA ===
      const PROXY_URL = 'https://script.google.com/macros/s/AKfycbz_xc4GpcLD5yWnWCqGz7Thnx4oQY5Dv1rBbxX1uR0HH112YCTT2o1Y8MQXYpSsUDOGJw/exec';   // ← SOSTITUISCI CON IL TUO URL (quello che finisce con /exec)
      const SECRET_KEY = 'SandraDario1982!2018!';                   // ← già messa quella che hai scelto tu

      const gid = '0';
      const query = 'select A, B, Q, S';

      const fullUrl = `${PROXY_URL}?key=${SECRET_KEY}&gid=${gid}&q=${encodeURIComponent(query)}`;

      var queryObj = new google.visualization.Query(fullUrl);
      queryObj.send(handleQueryResponse);
    }

    function handleQueryResponse(response) {
      if (response.isError()) {
        console.log('Errore:', response.getMessage());
        return;
      }
      var data = response.getDataTable();

      var options = {
        title: 'Upstream companies NYSE',
        titleTextStyle: { color: '#f8fafc', fontSize: 22, bold: true },
        width: '100%',
        height: 620,
        backgroundColor: '#0f172a',
        legend: { position: 'bottom', textStyle: { color: '#e2e8f0', fontSize: 13 } },
        seriesType: 'line',
        curveType: 'function',

        tooltip: { trigger: 'none' },   // ← tooltip disattivato

        vAxes: {
          0: { title: 'Scala SINISTRA (Colonna B)', titleTextStyle: { color: '#cbd5e1' }, textStyle: { color: '#cbd5e1' }, gridlines: { color: '#334155' } },
          1: { title: 'Scala DESTRA (Colonne Q e S)', titleTextStyle: { color: '#cbd5e1' }, textStyle: { color: '#cbd5e1' }, gridlines: { color: '#334155' } }
        },
        series: {
          0: { targetAxisIndex: 0, color: '#22d3ee', lineWidth: 5, pointSize: 0 },
          1: { targetAxisIndex: 1, color: '#c084fc', lineWidth: 2.5, pointSize: 0 },
          2: { targetAxisIndex: 1, color: '#4ade80', lineWidth: 2.5, pointSize: 0 }
        },
        hAxis: { 
          title: 'Data',
          titleTextStyle: { color: '#cbd5e1' },
          textStyle: { color: '#cbd5e1' },
          gridlines: { color: '#334155' }
        },
        chartArea: { width: '82%', height: '72%', backgroundColor: '#0f172a' }
      };

      var chart = new google.visualization.ComboChart(document.getElementById('chart_div'));
      chart.draw(data, options);
    }
  </script>
</head>
<body style="margin:0; padding:10px; background:#0f172a;">
  <div id="chart_div" style="width:100%; height:620px; border-radius:8px; overflow:hidden;"></div>
  
  <p style="text-align:center; margin-top:15px; font-size:14px; color:#94a3b8;">
    Source: Google Sheets (aggiornato automaticamente)<br>
    <a href="https://commoditysupercycle.com/" target="_blank" style="color:#67e8f9; font-weight:bold; text-decoration:none;">
      commoditysupercycle.com
    </a>
  </p>
</body>
</html>
