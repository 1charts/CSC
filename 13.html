
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royalties & Trusts | CommoditySuperCycle</title>

<link rel="icon" type="image/png" href="https://commoditysupercycle.com/assets/logo192-C5BlHOLs.png">
<link rel="apple-touch-icon" href="https://commoditysupercycle.com/assets/logo192-C5BlHOLs.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { margin:0; background:#0f172a; font-family: 'Segoe UI', Arial, sans-serif; color:#e2e8f0; }
.container { max-width:1100px; margin:auto; padding:20px; }

/* Area Cattura: include tutto tranne i bottoni in alto a destra */
#full-capture-area { background: #0f172a; padding: 15px; border-radius: 8px; }

.header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.title-group { flex: 1; }
.title { font-size:26px; font-weight: bold; color:#f8fafc; margin: 0; }
.subtitle { font-size:16px; margin-top:5px; }
.subtitle a { color:#67e8f9; text-decoration:none; opacity: 0.8; }

/* Bottoni Social e Screenshot (Esclusi dalla cattura) */
.actions { display: flex; gap: 10px; }
.action-btn { 
    background: #1e293b; border: none; color: #f8fafc; padding: 8px; 
    border-radius: 6px; cursor: pointer; display: flex; align-items: center; 
    transition: background 0.2s; text-decoration: none;
}
.action-btn:hover { background: #334155; }
.action-btn svg { width: 20px; height: 20px; fill: currentColor; }

/* Wrapper Grafico */
.chart-container { position: relative; width: 100%; margin-top: 10px; }
img { width:100%; height:auto; border-radius:4px; display: block; }

/* Navigazione: Sotto l'asse X a destra */
.nav-bottom {
    display: flex;
    justify-content: flex-end;
    gap: 15px;
    margin-top: -35px; /* Sovrappone leggermente lo spazio vuoto sotto l'asse X */
    padding-right: 10px;
    position: relative;
    z-index: 20;
}

.nav-link {
    background: rgba(30, 41, 59, 0.9);
    color: #67e8f9;
    padding: 8px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    transition: 0.2s;
    border: 1px solid #334155;
}
.nav-link:hover { background: #334155; transform: translateY(-2px); }
.nav-link svg { width: 28px; height: 28px; stroke-width: 3; }

.source { margin-top:40px; font-size:13px; color:#94a3b8; }
.source a { color:#67e8f9; text-decoration:none; }
</style>
</head>

<body>
<div class="container">

  <div class="header-row">
    <div id="capture-header" class="title-group">
      <div class="title">Royalties & Trusts</div>
      <div class="subtitle"><a href="https://commoditysupercycle.com/" target="_blank">commoditysupercycle.com</a></div>
    </div>
    
    <div class="actions">
      <button class="action-btn" onclick="takeScreenshot()" title="Save Image">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      </button>
      <a class="action-btn" href="https://twitter.com/intent/tweet?url=https://1charts.github.io/CSC/13.html&text=Royalties%20%26%20Trusts%20-%20via%20%40CommodityCSC" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.045 4.126H5.078z"/></svg>
      </a>
      <a class="action-btn" href="https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2F1charts.github.io%2FCSC%2F13.html" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      </a>
    </div>
  </div>

  <div id="full-capture-area">
    <div id="screenshot-title-box" style="display:none; margin-bottom:15px;">
        <div style="font-size:26px; font-weight:bold; color:#f8fafc;">Royalties & Trusts</div>
        <div style="font-size:16px; color:#67e8f9;">commoditysupercycle.com</div>
    </div>

    <div class="chart-container">
      <img src="charts/13.png">
    </div>

    <div class="nav-bottom" id="nav-arrows">
        <a class="nav-link" href="12.html" title="Prev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg></a>
        <a class="nav-link" href="14.html" title="Next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 18l6-6-6-6"/></svg></a>
    </div>

    <div class="source">
      Source: <a href="#" target="_blank">Dati Finanziari</a>
    </div>
  </div>

</div>

<script>
function takeScreenshot() {
    const area = document.getElementById('full-capture-area');
    const arrows = document.getElementById('nav-arrows');
    const screenshotBox = document.getElementById('screenshot-title-box');
    
    // Mostra titolo interno per cattura, nascondi frecce
    screenshotBox.style.display = 'block';
    arrows.style.visibility = 'hidden';

    html2canvas(area, {
        backgroundColor: "#0f172a",
        scale: 2,
        useCORS: true
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = '13_CSC.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
        
        // Ripristina
        screenshotBox.style.display = 'none';
        arrows.style.visibility = 'visible';
    });
}
</script>

</body>
</html>
