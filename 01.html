<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grafico 01</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    body { margin:0; padding:0; background:#0f172a; font-family: Arial, sans-serif; }
    .container { max-width: 1250px; margin: 0 auto; padding: 10px; }
    canvas { width: 100% !important; height: auto !important; max-height: 85vh; }
    .source { text-align:center; margin-top:15px; color:#94a3b8; font-size:14px; }
    .error { color:#ff6b6b; text-align:center; padding:40px; background:#1e2937; border-radius:8px; }
  </style>
</head>
<body>
  <div class="container" id="main">
    <canvas id="myChart"></canvas>
  </div>

  <div class="source">
    <span id="sourceText"></span><br>
    <a href="https://commoditysupercycle.com/" target="_blank" style="color:#67e8f9; font-weight:bold;">commoditysupercycle.com</a>
  </div>

  <script>
    const CONFIG = {
      title: "Upstream companies NYSE",
      sourceText: "U.S. Energy Information Administration, Crude Oil Prices: Brent retrieved from FRED",
      sourceUrl: "https://fred.stlouisfed.org/series/DCOILBRENTEU",

      yLeft:  { min: 500, max: 5000 },
      yRight: { min: 0, max: 10000 },

      xColumn: "Data",

      curves: [
        { enabled: true, column: "B", label: "Capitalizzazione aziende oro", color: "#22d3ee", width: 5, yAxis: "left" },
        { enabled: true, column: "Q", label: "Curva 2", color: "#c084fc", width: 2.5, yAxis: "right" },
        { enabled: true, column: "S", label: "Curva 3", color: "#4ade80", width: 2.5, yAxis: "right" },
        { enabled: false, column: "", label: "", color: "#ff6b6b", width: 2.5, yAxis: "right" }
      ]
    };

    // URL CORRETTO del tuo CSV
    const csvUrl = 'https://raw.githubusercontent.com/1charts/CSC/main-root/all-data.csv';

    fetch(csvUrl)
      .then(r => {
        if (!r.ok) throw new Error(`CSV non trovato (404). Controlla il percorso.`);
        return r.text();
      })
      .then(text => {
        Papa.parse(text, {
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            console.log("Intestazioni trovate:", Object.keys(results.data[0] || {}));
            console.log("Prime 5 righe:", results.data.slice(0,5));

            const data = results.data.filter(row => row && !String(row[0] || '').startsWith("==="));

            if (data.length === 0) {
              throw new Error("Nessun dato valido trovato nel CSV");
            }

            const labels = data.map(row => row[CONFIG.xColumn] || row[0] || "");
            const yearLabels = labels.map(l => String(l).substring(0,4));

            const datasets = [];

            CONFIG.curves.forEach(curve => {
              if (!curve.enabled) return;
              datasets.push({
                label: curve.label,
                data: data.map(row => parseFloat(row[curve.column]) || null),
                borderColor: curve.color,
                borderWidth: curve.width,
                tension: 0.3,
                yAxisID: curve.yAxis
              });
            });

            document.getElementById('sourceText').innerHTML = 
              `<a href="${CONFIG.sourceUrl}" target="_blank" style="color:#94a3b8;">${CONFIG.sourceText}</a>`;

            new Chart(document.getElementById('myChart'), {
              type: 'line',
              data: { labels: yearLabels, datasets: datasets },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  title: { display: true, text: CONFIG.title, color: '#f8fafc', font: { size: 21, weight: 'bold' } },
                  legend: { position: 'bottom', labels: { color: '#e2e8f0', font: { size: 13 } } },
                  tooltip: { mode: 'index', intersect: false }
                },
                scales: {
                  x: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } },
                  yLeft: { type: 'linear', position: 'left', min: CONFIG.yLeft.min, max: CONFIG.yLeft.max, grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } },
                  yRight: { type: 'linear', position: 'right', min: CONFIG.yRight.min, max: CONFIG.yRight.max, grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } }
                }
              }
            });
          }
        });
      })
      .catch(err => {
        console.error(err);
        document.getElementById('main').innerHTML = `<div class="error">Errore: ${err.message}<br><br>Controlla che il file all-data.csv esista nella cartella main-root.</div>`;
      });
  </script>
</body>
</html>
