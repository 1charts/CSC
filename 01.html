<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grafico 01 - Upstream companies NYSE</title>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  
  <!-- PapaParse per leggere il CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f172a;
      font-family: Arial, sans-serif;
    }
    .container {
      max-width: 1250px;
      margin: 0 auto;
      padding: 10px;
    }
    canvas {
      width: 100% !important;
      height: auto !important;
      max-height: 85vh;
    }
    .source {
      text-align: center;
      margin-top: 15px;
      color: #94a3b8;
      font-size: 14px;
    }
    .source a {
      color: #67e8f9;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <canvas id="myChart"></canvas>
  </div>

  <div class="source">
    Source: Google Sheets (aggiornato automaticamente)<br>
    <a href="https://commoditysupercycle.com/" target="_blank">commoditysupercycle.com</a>
  </div>

  <script>
    const csvUrl = 'https://raw.githubusercontent.com/1charts/CSC/main/all-data.csv';

    fetch(csvUrl)
      .then(response => response.text())
      .then(csvText => {
        Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            const data = results.data;

            // Per ora prendiamo tutti i dati (dopo ti aiuto a filtrare per scheda)
            const labels = data.map(row => row['Data'] || row[0] || '');
            const leftScale = data.map(row => parseFloat(row['B'] || row[1]) || null);
            const right1 = data.map(row => parseFloat(row['Q'] || row[2]) || null);
            const right2 = data.map(row => parseFloat(row['S'] || row[3]) || null);

            new Chart(document.getElementById('myChart'), {
              type: 'line',
              data: {
                labels: labels,
                datasets: [
                  {
                    label: 'Scala Sinistra',
                    data: leftScale,
                    borderColor: '#22d3ee',
                    borderWidth: 4,
                    tension: 0.3,
                    yAxisID: 'yLeft'
                  },
                  {
                    label: 'Destra 1',
                    data: right1,
                    borderColor: '#c084fc',
                    borderWidth: 2.5,
                    tension: 0.3,
                    yAxisID: 'yRight'
                  },
                  {
                    label: 'Destra 2',
                    data: right2,
                    borderColor: '#4ade80',
                    borderWidth: 2.5,
                    tension: 0.3,
                    yAxisID: 'yRight'
                  }
                ]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: { 
                    position: 'bottom',
                    labels: { color: '#e2e8f0', font: { size: 13 } }
                  },
                  tooltip: { mode: 'index', intersect: false }
                },
                scales: {
                  x: {
                    grid: { color: '#334155' },
                    ticks: { color: '#cbd5e1' }
                  },
                  yLeft: {
                    type: 'linear',
                    position: 'left',
                    grid: { color: '#334155' },
                    ticks: { color: '#cbd5e1' },
                    title: { display: true, text: 'Scala SINISTRA', color: '#cbd5e1' }
                  },
                  yRight: {
                    type: 'linear',
                    position: 'right',
                    grid: { color: '#334155' },
                    ticks: { color: '#cbd5e1' },
                    title: { display: true, text: 'Scala DESTRA', color: '#cbd5e1' }
                  }
                }
              }
            });
          }
        });
      })
      .catch(err => {
        console.error('Errore caricamento CSV:', err);
        document.querySelector('.container').innerHTML += '<p style="color:#ff6b6b; text-align:center;">Errore nel caricamento dei dati.</p>';
      });
  </script>
</body>
</html>
