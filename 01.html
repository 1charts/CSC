<script>
  const CONFIG = {
    title: "Upstream companies NYSE",

    sourceText: "U.S. Energy Information Administration, Crude Oil Prices: Brent retrieved from FRED",
    sourceUrl: "https://fred.stlouisfed.org/series/DCOILBRENTEU",

    yLeft:  { min: 0, max: 5000 },
    yRight: { min: 0, max: 7000 },

    // ❗ FIX 1: usa nome reale colonna data
    xColumn: "Data",

    curves: [
      // ❗ FIX 2: usa nomi REALI colonne CSV
      { enabled: true, column: "B", label: "Capitalizzazione aziende oro", color: "#22d3ee", width: 5, yAxis: "yLeft" },
      { enabled: true, column: "Q", label: "Curva 2", color: "#c084fc", width: 2.5, yAxis: "yRight" },
      { enabled: true, column: "S", label: "Curva 3", color: "#4ade80", width: 2.5, yAxis: "yRight" }
    ]
  };

  const csvUrl = 'https://raw.githubusercontent.com/1charts/CSC/main-root/all-data.csv';

  fetch(csvUrl)
    .then(r => r.text())
    .then(text => {
      Papa.parse(text, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {

          // ❗ FIX 3: rimuovi righe completamente vuote
          const data = results.data.filter(row => row && Object.keys(row).length > 0);

          // ❗ DEBUG (fondamentale)
          console.log("HEADER CSV:", Object.keys(data[0]));

          const labels = data.map(row => row[CONFIG.xColumn] || "");
          const yearLabels = labels.map(l => String(l).substring(0,4));

          const datasets = [];

          CONFIG.curves.forEach(curve => {
            if (!curve.enabled) return;

            // ❗ FIX 4: gestione fallback se nome colonna non esiste
            const cleanedData = data.map(row => {
              let val = row[curve.column];

              if (val === undefined) return null;

              return parseFloat(String(val).replace(/[^0-9.-]/g, '')) || null;
            });

            datasets.push({
              label: curve.label,
              data: cleanedData,
              borderColor: curve.color,
              borderWidth: curve.width,
              tension: 0.3,
              yAxisID: curve.yAxis
            });
          });

          document.getElementById('sourceText').innerHTML = 
            `<a href="${CONFIG.sourceUrl}" target="_blank" style="color:#94a3b8;">${CONFIG.sourceText}</a>`;

          new Chart(document.getElementById('myChart'), {
            type: 'line',
            data: { labels: yearLabels, datasets: datasets },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                title: { display: true, text: CONFIG.title, color: '#f8fafc', font: { size: 21, weight: 'bold' } },
                legend: { position: 'bottom', labels: { color: '#e2e8f0', font: { size: 13 } } }
              },
              scales: {
                x: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } },
                yLeft: { 
                  type: 'linear', position: 'left', 
                  min: CONFIG.yLeft.min, max: CONFIG.yLeft.max,
                  grid: { color: '#334155' }, ticks: { color: '#cbd5e1' }
                },
                yRight: { 
                  type: 'linear', position: 'right', 
                  min: CONFIG.yRight.min, max: CONFIG.yRight.max,
                  grid: { color: '#334155' }, ticks: { color: '#cbd5e1' }
                }
              }
            }
          });
        }
      });
    })
    .catch(err => console.error("Errore:", err));
</script>
