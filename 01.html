<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grafico 01</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    body { margin:0; padding:0; background:#0f172a; font-family: Arial, sans-serif; }
    .container { max-width: 1250px; margin: 0 auto; padding: 10px; }
    canvas { width: 100% !important; height: auto !important; max-height: 85vh; }
    .source { text-align:center; margin-top:15px; color:#94a3b8; font-size:14px; }
  </style>
</head>
<body>
  <div class="container">
    <canvas id="myChart"></canvas>
  </div>

  <div class="source">
    <span id="sourceText"></span><br>
    <a href="https://commoditysupercycle.com/" target="_blank" style="color:#67e8f9; font-weight:bold;">commoditysupercycle.com</a>
  </div>

  <script>
    const CONFIG = {
      title: "Upstream companies NYSE",

      sourceText: "U.S. Energy Information Administration, Crude Oil Prices: Brent retrieved from FRED",
      sourceUrl: "https://fred.stlouisfed.org/series/DCOILBRENTEU",

      yLeft:  { min: 0, max: 5000 },
      yRight: { min: 1000, max: 3000 },

      // Colonne del CSV (usa i nomi esatti della prima riga)
      xColumn: "Data",

      curves: [
        { enabled: true, column: "B", label: "Capitalizzazione aziende oro", color: "#22d3ee", width: 5, yAxis: "left" },
        { enabled: true, column: "Q", label: "Curva xxx", color: "#c084fc", width: 2.5, yAxis: "right" },
        { enabled: true, column: "S", label: "Curva 3", color: "#4ade80", width: 2.5, yAxis: "right" },
        { enabled: false, column: "", label: "", color: "#ff6b6b", width: 2.5, yAxis: "right" }
      ]
    };

    const csvUrl = 'https://raw.githubusercontent.com/1charts/CSC/main-root/all-data.csv';

    fetch(csvUrl)
      .then(r => r.text())
      .then(text => {
        Papa.parse(text, {
          header: true,           // Ora funziona grazie alla prima riga con i nomi
          skipEmptyLines: true,
          complete: function(results) {
            const data = results.data.filter(row => row && !String(row[0] || '').startsWith("==="));

            const labels = data.map(row => row[CONFIG.xColumn] || "");
            const yearLabels = labels.map(l => String(l).substring(0,4));

            const datasets = [];

            CONFIG.curves.forEach(curve => {
              if (!curve.enabled) return;
              datasets.push({
                label: curve.label,
                data: data.map(row => parseFloat(row[curve.column]) || null),
                borderColor: curve.color,
                borderWidth: curve.width,
                tension: 0.3,
                yAxisID: curve.yAxis
              });
            });

            // Aggiorna la source
            document.getElementById('sourceText').innerHTML = 
              `<a href="${CONFIG.sourceUrl}" target="_blank" style="color:#94a3b8;">${CONFIG.sourceText}</a>`;

            new Chart(document.getElementById('myChart'), {
              type: 'line',
              data: { labels: yearLabels, datasets: datasets },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  title: { 
                    display: true, 
                    text: CONFIG.title, 
                    color: '#f8fafc', 
                    font: { size: 21, weight: 'bold' } 
                  },
                  legend: { 
                    position: 'bottom', 
                    labels: { color: '#e2e8f0', font: { size: 13 } } 
                  }
                },
                scales: {
                  x: { 
                    grid: { color: '#334155' }, 
                    ticks: { color: '#cbd5e1' } 
                  },
                  yLeft: { 
                    type: 'linear', 
                    position: 'left', 
                    min: CONFIG.yLeft.min, 
                    max: CONFIG.yLeft.max,
                    grid: { color: '#334155' }, 
                    ticks: { color: '#cbd5e1' } 
                  },
                  yRight: { 
                    type: 'linear', 
                    position: 'right', 
                    min: CONFIG.yRight.min, 
                    max: CONFIG.yRight.max,
                    grid: { color: '#334155' }, 
                    ticks: { color: '#cbd5e1' } 
                  }
                }
              }
            });
          }
        });
      })
      .catch(err => console.error("Errore fetch CSV:", err));
  </script>
</body>
</html>
