
<!DOCTYPE html>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { margin:0; background:#0f172a; font-family: 'Segoe UI', Arial, sans-serif; color:#e2e8f0; }
.container { max-width:1100px; margin:auto; padding:20px; position: relative; }

/* Header e Titoli */
.header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.title-group { flex: 1; }
.title { font-size:26px; font-weight: bold; color:#f8fafc; margin: 0; }
.subtitle { font-size:16px; margin-top:5px; }
.subtitle a { color:#67e8f9; text-decoration:none; opacity: 0.8; }
.subtitle a:hover { opacity: 1; }

/* Pulsanti Azione (Top Right) */
.actions { display: flex; gap: 10px; align-items: center; }
.action-btn { 
    background: #1e293b; border: none; color: #f8fafc; padding: 8px; 
    border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; text-decoration: none;
}
.action-btn:hover { background: #334155; }
.action-btn svg { width: 20px; height: 20px; fill: currentColor; }

/* Area Grafico e Navigazione */
#capture-area { background: #0f172a; padding: 10px; border-radius: 8px; }
.chart-wrapper { position: relative; width: 100%; }
img { width:100%; height:auto; border-radius:8px; display: block; }

.nav-overlay {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 8px;
    z-index: 10;
}

.nav-btn {
    background: rgba(30, 41, 59, 0.7);
    color: #67e8f9;
    border: none;
    padding: 12px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    text-decoration: none;
}
.nav-btn:hover { background: rgba(51, 65, 85, 0.9); transform: scale(1.1); }
.nav-btn svg { width: 24px; height: 24px; stroke-width: 2.5; }

.source { margin-top:15px; font-size:14px; color:#94a3b8; }
.source a { color:#67e8f9; text-decoration:none; }
</style>
</head>

<body>
<div class="container">

  <div class="header-row">
    <div class="title-group">
      <div class="title">Molybdenum Tungsten</div>
      <div class="subtitle"><a href="https://commoditysupercycle.com/" target="_blank">commoditysupercycle.com</a></div>
    </div>
    
    <div class="actions">
      <button class="action-btn" onclick="takeScreenshot()" title="Download Chart">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>

        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.045 4.126H5.078z"/></svg>
      </a>

      </a>
    </div>
  </div>

  <div id="capture-area">
    <div class="chart-wrapper">
      <img src="charts/39.png">
      
      <div class="nav-overlay">
        <a class="nav-btn" href="38.html" title="Previous"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg></a>

    </div>

    <div class="source">
      Source: <a href="#" target="_blank">Dati Finanziari</a>
    </div>
  </div>

</div>

<script>
function takeScreenshot() {
    const area = document.getElementById('capture-area');
    const nav = document.querySelector('.nav-overlay');
    
    // Nascondi frecce per lo screenshot
    nav.style.display = 'none';

    html2canvas(area, {
        backgroundColor: "#0f172a",
        scale: 2, // Alta qualità
        logging: false,
        useCORS: true
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = '39_chart.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
        
        // Mostra di nuovo le frecce
        nav.style.display = 'flex';
    });
}
</script>

</body>
</html>
